openapi: 3.1.0
info:
  title: Synthetic Constraint Validation API
  version: 1.0.0
  description: Fictional API demonstrating deterministic boundary and negative cases.
paths:
  /products:
    post:
      operationId: createProduct
      parameters:
        - name: batch
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 5
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProduct"
      responses:
        "201":
          description: Synthetic product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Request violates the approved schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
components:
  schemas:
    CreateProduct:
      type: object
      additionalProperties: false
      required: [name, tier, quantity, tags]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 8
        tier:
          type: string
          enum: [STANDARD, PREMIUM]
        quantity:
          type: integer
          minimum: 1
          maximum: 10
        tags:
          type: array
          minItems: 1
          maxItems: 3
          items:
            type: string
    Product:
      type: object
      required: [id, synthetic]
      properties:
        id:
          type: string
          example: SYN-PRODUCT-001
        synthetic:
          type: boolean
          const: true
    ValidationError:
      type: object
      required: [code, synthetic]
      properties:
        code:
          type: string
          const: INVALID_REQUEST
        synthetic:
          type: boolean
          const: true
