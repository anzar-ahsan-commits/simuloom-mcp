name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest
      - run: uv build
      - run: uv run simuloom-gitops --help
      - name: Start WireMock
        run: docker compose up -d wiremock
      - name: Wait for WireMock
        run: |
          for attempt in {1..30}; do
            curl --fail --silent http://localhost:8080/__admin/mappings && exit 0
            sleep 1
          done
          exit 1
      - name: Run WireMock integration test
        run: uv run pytest -q tests/test_wiremock_integration.py
        env:
          SIMULOOM_WIREMOCK_INTEGRATION: "1"
      - name: Stop WireMock
        if: always()
        run: docker compose down
