name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    if: github.repository == 'anzar-ahsan-commits/simuloom-mcp'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
