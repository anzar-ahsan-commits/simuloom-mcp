name: Feature request
description: Propose a focused product or platform improvement
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operational problem should SimuLoom solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe behavior and acceptance criteria, not only implementation.
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and security considerations
      description: Note API, MCP, runtime, data, authentication, or AI trust-boundary effects.
