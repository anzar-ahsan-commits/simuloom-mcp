apiVersion: v1
kind: ConfigMap
metadata:
  name: simuloom-config
data:
  SIMULOOM_WORKSPACE: /app/workspace
  SIMULOOM_RUNTIME: wiremock
  WIREMOCK_URL: http://wiremock:8080
  SIMULOOM_PLATFORM_DB: /app/workspace/runtime/platform.db
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: simuloom-workspace
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simuloom
spec:
  replicas: 1
  selector:
    matchLabels: {app: simuloom}
  template:
    metadata:
      labels: {app: simuloom}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: simuloom
          image: ghcr.io/replace-me/simuloom-mcp:0.41.0
          ports:
            - {name: http, containerPort: 8000}
          envFrom:
            - configMapRef: {name: simuloom-config}
            - secretRef: {name: simuloom-secrets, optional: true}
          volumeMounts:
            - {name: workspace, mountPath: /app/workspace}
          readinessProbe:
            httpGet: {path: /api/v1/readyz, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /api/v1/health, port: http}
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: {cpu: 100m, memory: 192Mi}
            limits: {cpu: "1", memory: 1Gi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: [ALL]}
      volumes:
        - name: workspace
          persistentVolumeClaim: {claimName: simuloom-workspace}
---
apiVersion: v1
kind: Service
metadata:
  name: simuloom
spec:
  selector: {app: simuloom}
  ports:
    - {name: http, port: 8000, targetPort: http}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wiremock
spec:
  replicas: 1
  selector:
    matchLabels: {app: wiremock}
  template:
    metadata:
      labels: {app: wiremock}
    spec:
      containers:
        - name: wiremock
          image: wiremock/wiremock:3.13.2
          args: ["--global-response-templating"]
          ports:
            - {name: http, containerPort: 8080}
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: "1", memory: 512Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: wiremock
spec:
  selector: {app: wiremock}
  ports:
    - {name: http, port: 8080, targetPort: http}
